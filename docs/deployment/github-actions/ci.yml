name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'arena/**'

permissions:
  contents: read

jobs:
  backend:
    name: Backend quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: bcmath, dom, gd, mbstring, pdo_mysql, zip
          coverage: none

      - name: Validate Composer manifest
        run: composer validate --no-check-lock --strict

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP syntax check
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml

  frontend:
    name: Frontend quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1

  docker:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Compose files
        run: |
          cp docker/env/production.env.example .env
          docker compose -f docker-compose.yml config >/tmp/skyfi-dev-compose.yml
          docker compose -f docker-compose.prod.yml config >/tmp/skyfi-prod-compose.yml

      - name: Build backend PHP-FPM image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: php-fpm
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend static image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: static
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build production nginx gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

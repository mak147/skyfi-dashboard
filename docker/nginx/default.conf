upstream skyfi_php {
    server backend:9000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    root /var/www/frontend;
    index index.html;

    charset utf-8;
    server_tokens off;
    client_max_body_size 32m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location = /healthz {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/healthz.php;
        fastcgi_param SCRIPT_NAME /healthz;
        fastcgi_pass skyfi_php;
    }

    location = /readyz {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/readyz.php;
        fastcgi_param SCRIPT_NAME /readyz;
        fastcgi_pass skyfi_php;
    }

    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
        fastcgi_pass skyfi_php;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}

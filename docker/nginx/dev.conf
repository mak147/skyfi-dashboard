upstream skyfi_php_dev {
    server backend:9000;
}

upstream skyfi_frontend_dev {
    server frontend:5173;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 64m;

    location = /healthz {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/healthz.php;
        fastcgi_param SCRIPT_NAME /healthz;
        fastcgi_pass skyfi_php_dev;
    }

    location = /readyz {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/readyz.php;
        fastcgi_param SCRIPT_NAME /readyz;
        fastcgi_pass skyfi_php_dev;
    }

    location ^~ /api/ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 120s;
        fastcgi_pass skyfi_php_dev;
    }

    location / {
        proxy_pass http://skyfi_frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

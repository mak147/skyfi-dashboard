; SkyFi development PHP overrides
expose_php = Off
memory_limit = 512M
max_execution_time = 120
post_max_size = 64M
upload_max_filesize = 64M
date.timezone = UTC
log_errors = On
error_log = /proc/self/fd/2
display_errors = On
display_startup_errors = On
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

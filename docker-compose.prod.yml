name: skyfi-production

services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    image: ${SKYFI_NGINX_IMAGE:-skyfi/nginx:latest}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${SKYFI_HTTP_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - skyfi
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: php-fpm
      args:
        APP_ENV: production
    image: ${SKYFI_BACKEND_IMAGE:-skyfi/backend:latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:?APP_URL is required}
      APP_ISSUER: ${APP_ISSUER:?APP_ISSUER is required}
      APP_AUDIENCE: ${APP_AUDIENCE:?APP_AUDIENCE is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-2592000}
      JWT_SESSION_REFRESH_TTL: ${JWT_SESSION_REFRESH_TTL:-28800}
      DB_DSN: mysql:host=mariadb;port=3306;dbname=${MARIADB_DATABASE:?MARIADB_DATABASE is required};charset=utf8mb4
      DB_USERNAME: ${MARIADB_USER:?MARIADB_USER is required}
      DB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      REFRESH_COOKIE_SECURE: "true"
      LOG_PATH: storage/logs/app.log
      MIKROTIK_CREDENTIAL_ENCRYPTION_KEY: ${MIKROTIK_CREDENTIAL_ENCRYPTION_KEY:?MIKROTIK_CREDENTIAL_ENCRYPTION_KEY is required}
      PHP_FPM_MAX_CHILDREN: ${PHP_FPM_MAX_CHILDREN:-40}
      PHP_FPM_START_SERVERS: ${PHP_FPM_START_SERVERS:-8}
      PHP_FPM_MIN_SPARE_SERVERS: ${PHP_FPM_MIN_SPARE_SERVERS:-4}
      PHP_FPM_MAX_SPARE_SERVERS: ${PHP_FPM_MAX_SPARE_SERVERS:-12}
      PHP_FPM_MAX_REQUESTS: ${PHP_FPM_MAX_REQUESTS:-500}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-storage:/var/www/backend/storage
    networks:
      - skyfi
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(is_file(\"/var/www/backend/public/index.php\") ? 0 : 1);'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  supervisor:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: supervisor
      args:
        APP_ENV: production
    image: ${SKYFI_SUPERVISOR_IMAGE:-skyfi/supervisor:latest}
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:?APP_URL is required}
      APP_ISSUER: ${APP_ISSUER:?APP_ISSUER is required}
      APP_AUDIENCE: ${APP_AUDIENCE:?APP_AUDIENCE is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DB_DSN: mysql:host=mariadb;port=3306;dbname=${MARIADB_DATABASE:?MARIADB_DATABASE is required};charset=utf8mb4
      DB_USERNAME: ${MARIADB_USER:?MARIADB_USER is required}
      DB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      MIKROTIK_CREDENTIAL_ENCRYPTION_KEY: ${MIKROTIK_CREDENTIAL_ENCRYPTION_KEY:?MIKROTIK_CREDENTIAL_ENCRYPTION_KEY is required}
      SKYFI_WORKER_INTERVAL_SECONDS: ${SKYFI_WORKER_INTERVAL_SECONDS:-300}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-storage:/var/www/backend/storage
    networks:
      - skyfi

  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=${MARIADB_INNODB_BUFFER_POOL_SIZE:-1G}
      - --max-connections=${MARIADB_MAX_CONNECTIONS:-200}
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:?MARIADB_DATABASE is required}
      MARIADB_USER: ${MARIADB_USER:?MARIADB_USER is required}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD is required}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./backups/mariadb:/backups
    networks:
      - skyfi
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis-data:/data
    networks:
      - skyfi
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  backend-storage:
  mariadb-data:
  redis-data:

networks:
  skyfi:
    driver: bridge
